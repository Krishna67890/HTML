<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 100%;
            height: 50px;
            background-color: black;
            border: 1px solid black;
        }
        .container1{
            background-color: red;
            border: 1px solid black;
        }
        .container2{
            background-color: blue;
            border: 1px solid black;
        }
        .container3{
            background-color: green;
            border: 1px solid black;
        }
        .container4{
            background-color: yellow;
            border: 1px solid black;
        }
        .container5{
            position:sticky;
            border: 1px solid pink;
            top:20px;
        }
        .parent{
            background-color: black;
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="grandparent">
        <div class="parent">
            <div class="container container1">1</div>
            <div class="container container2">2</div>
            <div class="container container3">3</div>
            <div class="container container4">4</div>
        </div>
    </div>
</body>
</html>
