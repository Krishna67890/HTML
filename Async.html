        function myfetch(url, options) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open("GET", url, true); // Asynchronous request

                // Optional: Set headers from options if provided
                if (options && options.headers) {
                    for (const header in options.headers) {
                        xhr.setRequestHeader(header, options.headers[header]);
                    }
                }

                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        // Simulating a response object
                        const responseObj = {
                            status: xhr.status,
                            url: url,
                            data: xhr.responseText,
                            type: xhr.responseType,
                            ok: true
                        };
                        resolve(responseObj);
                    } else {
                        reject(`Error: ${xhr.status} - ${xhr.statusText}`);
                    }
                };

                xhr.onerror = function () {
                    reject("Network error or server timeout.");
                };

                xhr.send();
            });
        }

        // Usage Example

        function myfetch(url, options = {}) {
            return new Promise((res, rej) => {
                const xhttpReq = new XMLHttpRequest();

                xhttpReq.open(options.method || "GET", url);

                // Set headers if provided in options
                if (options.headers) {
                    Object.entries(options.headers).forEach(([key, value]) => {
                        xhttpReq.setRequestHeader(key, value);
                    });
                }

                // Handle response
                xhttpReq.onload = () => {
                    const responseObj = {
                        status: xhttpReq.status,
                        url: url,
                        data: xhttpReq.responseText,
                        ok: xhttpReq.status >= 200 && xhttpReq.status < 300,
                        json: () => Promise.resolve(JSON.parse(xhttpReq.responseText)),
                    };

                    if (responseObj.ok) {
                        res(responseObj);
                    } else {
                        rej(new Error(`HTTP error: ${xhttpReq.status}`));
                    }
                };

                // Handle network errors
                xhttpReq.onerror = () => {
                    rej(new Error("Network Error"));
                };

                // Handle timeout (optional)
                xhttpReq.timeout = options.timeout || 0; // No timeout by default
                xhttpReq.ontimeout = () => {
                    rej(new Error("Request Timed Out"));
                };

                // Send the request with body if provided
                xhttpReq.send(options.body || null);
            });
        }
