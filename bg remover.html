<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
       }
       body{
        width: 100%;
        height: 100vh;
        background-color: rgb(27, 33, 39);
        display: flex;
        justify-content: center;
        align-items: center;
       }
       .logo{
         width: 100%;
         height: 80px;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 20px;
         box-sizing: border-box;

       }
       .logo h1 {
         color:aliceblue;
         font-size: 30px;
         margin-left: 10px;
       }
       .main{
         width: 100%;
         min-height: calc(100vh - 80px);
         background-color: rgb(39, 49, 57);
         display: flex;
         align-items: center;
         justify-content: space-around;
         flex-wrap: wrap;
         gap: 30px;
       }
       .style1{
        max-width: 500px;
        width: 90%;
        height: 500px;
        display: flex;
        align-items: center;
        justify-content: start;
        flex-direction: column;
       }
       .style2{
        max-width: 500px;
        width: 90%;
        height: 500px;
       }
       .image{
         width: 300px;
         height: 300px;
         background-image: url("transparent.jpg");
         display: flex;
         position: relative;
         border-radius: 10px;
         box-shadow: 2px 2px 10px black;

       }
       .image1{
         width: 300px;
         animation: remove 15s linear infinite;
         overflow: hidden;
         border-radius: 10px;
       }
       #withbg{
         width: 300px;

       }
       .image2{
         width: 300px;
         position: absolute;
         overflow: hidden;

       }
       #withoutbg{
         width: 300px;
       }

       .text{
          width: 100%;
          height: 25%;
          background: linear-gradient(to right, white, rgb(34, 149, 162), rgb(212, 89, 153), white);
          text-align: center;
          background-clip:text;
          -webkit-text-fill-color:transparent;
       }

       @keyframes remove {
       0% { 
            width: 100%;
       }
       50%{
         width: 0%;
       }
    </style>
</head>
<body>
     <div class="logo">
        <img src="logo.png" alt="Logo">
        <h1>Erase.bg</h1>
     </div>
     <div class="main">
       <div class="style1">
         <div class="image">
            <div class="image1"><img src="withbg.jpg" id="withbg" alt=""></div>
            <div class="image2"><img src="withoutbg.jpg" id="withoutbg" alt=""></div>
         </div>
         <div class="text">Remove Image Backgound & Download in PNG</div>

       </div>
       <div class="style2"></div>
     </div>


    <script>

    </script>
</body>
</html>
