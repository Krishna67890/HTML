<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Solver</title>
    <style>
       *{  
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
       }
       body{
        width: 100%;
        height: 100%;
        background-color: rgb(27, 33, 39);
        display: flex;
        justify-content: start;
        align-items: center;
        flex-direction: column;
        padding: 20px;  
        gap: 20px;
       }
      h1{
        color: white;
        font-size: 4vw;
        margin-bottom: 20px;
        background: linear-gradient(to right, white, rgb(9,192,216), rgb(215,12,94));
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .upload-image{
        max-width: 600px;
        width: 90%;
        height: 300px;
        background-color: rgb(66, 76, 86);
        border-radius: 50px;
        box-shadow: 2px 2px 10px black;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px; 
        flex-direction: column;
        color: white;
        font-size: 20px;
        transition: all 0.3s;
      }
      .inner-upload-image{
        width: 100%;
        height: 80%;
        background-color: rgb(21, 26, 32);
        border-radius: 50px;
        box-shadow: 2px 2px 10px black;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        position: relative;
        overflow: hidden;
        color: white;
        font-size: 20px;
        transition: all 0.3s;
        cursor: pointer;
      }
      img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50px;
      }
      button{
        background-color: black;
        padding: 10px 20px;
        font-size: 20px;
        border: none;
        border-radius: 20px;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
      }
      input[type="file"] {
        display: none;
      }
      .upload-label {
        background-color: black;
        color: white;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 20px;
        cursor: pointer;
      }
      .inner-upload-image:hover{
        box-shadow:inset 2px 2px 10px black;
        background-color: rgb(42, 51, 62);
      }
      .output-area {
        display: none;
        background-color: rgb(66, 76, 86);
        color: white;
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
        font-size: 18px;
      }
    </style>
</head>

</html>
