<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boll Goes Up (Whirly Bird Style)</title>
    <style>
        canvas {
            border: 2px solid black;
            display: block;
            margin: auto;
            background-color: lightblue;
        }
        #controls {
            text-align: center;
            margin-top: 10px;
            display: none; /* Hide until game starts */
        }
        button {
            font-size: 20px;
            padding: 10px;
            margin: 10px;
        }
        h1, #instructions {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        p {
            text-align: center;
            font-size: 18px;
        }
        #startScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>Boll Goes Up</h1>
        <p id="instructions">Press 'Start Game' to begin!</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <canvas id="gameCanvas" width="400" height="600" style="display:none;"></canvas>
    <p>Score: <span id="score">0</span></p>

    <div id="controls">
        <button onclick="moveLeft()">Left</button>
        <button onclick="jump()">Jump</button>
        <button onclick="moveRight()">Right</button>
        <button onclick="pauseGame()">Pause</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const controls = document.getElementById('controls');
        const startScreen = document.getElementById('startScreen');
        
        let ball = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            radius: 15,
            dy: 2, // Initial upward movement
            dx: 0,
            jumpStrength: -10,
            color: 'red',
            speed: 5
        };

        const platforms = [];
        const platformWidth = 80;
        const platformHeight = 10;
        const platformGap = 150;
        let score = 0;
        let gameOver = false;
        let gamePaused = false;
        let gameStarted = false;
        let animationFrame;

        function createPlatforms() {
            for (let i = 0; i < 6; i++) {
                platforms.push({
                    x: Math.random() * (canvas.width - platformWidth),
                    y: canvas.height - i * platformGap - 50,
                    width: platformWidth,
                    height: platformHeight,
                    color: 'green',
                });
            }
        }

        function jump() {
            if (!gamePaused && gameStarted) {
                ball.dy = ball.jumpStrength;
            }
        }

        function moveLeft() {
            if (!gamePaused && gameStarted) ball.dx = -ball.speed;
        }

        function moveRight() {
            if (!gamePaused && gameStarted) ball.dx = ball.speed;
        }

        function stopMovement() {
            ball.dx = 0; // Stop horizontal movement when key is released
        }

        function checkGameOver() {
            if (ball.y - ball.radius > canvas.height) {
                gameOver = true;
                cancelAnimationFrame(animationFrame);
                alert('Game Over! Your Score: ' + score);
                document.location.reload();
            }
        }

        function pauseGame() {
            if (!gameOver) {
                gamePaused = !gamePaused;
                if (gamePaused) {
                    cancelAnimationFrame(animationFrame);
                } else {
                    gameLoop();
                }
            }
        }

        function gameLoop() {
            if (gameOver || gamePaused) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gravity and movement
            ball.dy += 0.3; // Gravity effect
            ball.y += ball.dy;
            ball.x += ball.dx;

            // Ball boundary collision (left/right)
            if (ball.x - ball.radius < 0) ball.x = ball.radius;
            if (ball.x + ball.radius > canvas.width) ball.x = canvas.width - ball.radius;

            // Platform collision detection
            platforms.forEach((platform) => {
                if (
                    ball.dy > 0 && // Only when falling down
                    ball.y + ball.radius >= platform.y &&
                    ball.y + ball.radius <= platform.y + platform.height &&
                    ball.x > platform.x &&
                    ball.x < platform.x + platform.width
                ) {
                    ball.dy = ball.jumpStrength; // Jump when landing on platform
                    score++;
                    scoreDisplay.innerText = score;
                }

                // Move platforms downwards
                platform.y += 2;
                if (platform.y > canvas.height) {
                    platform.y = -platformGap;
                    platform.x = Math.random() * (canvas.width - platformWidth);
                }
            });

            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();

            // Draw platforms
            platforms.forEach((platform) => {
                ctx.fillStyle = platform.color;
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            });

            checkGameOver();
            animationFrame = requestAnimationFrame(gameLoop);
        }

        // Event listeners for keyboard controls
        document.addEventListener('keydown', function(event) {
            if (event.code === 'ArrowLeft') moveLeft();
            if (event.code === 'ArrowRight') moveRight();
            if (event.code === 'Space') jump();
        });

        document.addEventListener('keyup', function(event) {
            if (event.code === 'ArrowLeft' || event.code === 'ArrowRight') stopMovement();
        });

        function startGame() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            controls.style.display = 'block';
            gameStarted = true;
            ball.dy = ball.jumpStrength; // Start with a jump
            createPlatforms();
            gameLoop();
        }
    </script>
</body>
</html>
