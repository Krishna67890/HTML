        // Shuffle the questions array to randomize question order
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Shuffle the questions and select first 100 (in case we have more)
        const shuffledQuestions = shuffleArray([...questions]).slice(0, 100);
        
        // Variables to track test state
        let currentQuestionIndex = 0;
        let userAnswers = new Array(shuffledQuestions.length).fill(null);
        let testStartTime = null;
        let timerInterval = null;
        let testSubmitted = false;
        
        // DOM Elements
        const startBtn = document.getElementById('start-btn');
        const testModal = document.getElementById('test-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const progressBar = document.getElementById('progress-bar');
        const testTimer = document.getElementById('test-timer');
        const overallTimer = document.getElementById('overall-timer');
        const questionStatus = document.getElementById('question-status');
        const resultModal = document.getElementById('result-modal');
        const scoreDisplay = document.getElementById('score-display');
        const totalQuestionsDisplay = document.getElementById('total-questions');
        const correctAnswersDisplay = document.getElementById('correct-answers');
        const wrongAnswersDisplay = document.getElementById('wrong-answers');
        const unansweredDisplay = document.getElementById('unanswered');
        const timeTakenDisplay = document.getElementById('time-taken');
        const performanceMessage = document.getElementById('performance-message');
        const questionReview = document.getElementById('question-review');
        const reviewBtn = document.getElementById('review-btn');
        const closeResultBtn = document.getElementById('close-result-btn');
        
        // Event Listeners
        startBtn.addEventListener('click', startTest);
        closeModalBtn.addEventListener('click', confirmCloseTest);
        prevBtn.addEventListener('click', showPreviousQuestion);
        nextBtn.addEventListener('click', showNextQuestion);
        submitBtn.addEventListener('click', confirmSubmitTest);
        reviewBtn.addEventListener('click', reviewAllQuestions);
        closeResultBtn.addEventListener('click', closeResultModal);
        
        // Start the test
        function startTest() {
            testStartTime = new Date();
            startTimer();
            testModal.style.display = 'block';
            showQuestion(currentQuestionIndex);
            updateQuestionStatus();
        }
        
        // Timer functions
        function startTimer() {
            const endTime = new Date(testStartTime.getTime() + 60 * 60 * 1000); // 1 hour
            
            timerInterval = setInterval(() => {
                const now = new Date();
                const remainingTime = endTime - now;
                
                if (remainingTime <= 0) {
                    clearInterval(timerInterval);
                    submitTest();
                    return;
                }
                
                updateTimerDisplay(remainingTime);
            }, 1000);
        }
        
        function updateTimerDisplay(ms) {
            const hours = Math.floor(ms / (1000 * 60 * 60));
            const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((ms % (1000 * 60)) / 1000);
            
            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            testTimer.textContent = timeString;
            overallTimer.textContent = timeString;
        }
        
        // Display question
        function showQuestion(index) {
            if (index < 0 || index >= shuffledQuestions.length) return;
            
            currentQuestionIndex = index;
            const question = shuffledQuestions[index];
            
            questionText.textContent = `${index + 1}. ${question.question}`;
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, i) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                if (userAnswers[index] === i) {
                    optionElement.classList.add('selected');
                }
                optionElement.textContent = option;
                optionElement.addEventListener('click', () => selectOption(i));
                optionsContainer.appendChild(optionElement);
            });
            
            // Update navigation buttons
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === shuffledQuestions.length - 1;
            
            // Update progress bar
            progressBar.style.width = `${((index + 1) / shuffledQuestions.length) * 100}%`;
            
            // Update current question in status
            updateQuestionStatus();
        }
        
        // Select an option
        function selectOption(optionIndex) {
            userAnswers[currentQuestionIndex] = optionIndex;
            
            // Update UI
            const options = optionsContainer.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === optionIndex);
            });
            
            // Update question status
            updateQuestionStatus();
        }
        
        // Navigation functions
        function showPreviousQuestion() {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            }
        }
        
        function showNextQuestion() {
            if (currentQuestionIndex < shuffledQuestions.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            }
        }
        
        // Update question status indicators
        function updateQuestionStatus() {
            questionStatus.innerHTML = '';
            
            shuffledQuestions.forEach((_, i) => {
                const statusBtn = document.createElement('div');
                statusBtn.className = 'status-btn';
                
                if (userAnswers[i] !== null) {
                    statusBtn.classList.add('answered');
                } else {
                    statusBtn.classList.add('unanswered');
                }
                
                if (i === currentQuestionIndex) {
                    statusBtn.classList.add('current');
                }
                
                statusBtn.textContent = i + 1;
                statusBtn.addEventListener('click', () => showQuestion(i));
                questionStatus.appendChild(statusBtn);
            });
        }
        
        // Confirm before closing test
        function confirmCloseTest() {
            if (testSubmitted) {
                testModal.style.display = 'none';
                return;
            }
            
            if (confirm('Are you sure you want to close the test? Your progress will be lost.')) {
                clearInterval(timerInterval);
                testModal.style.display = 'none';
                resetTest();
            }
        }
        
        // Confirm before submitting test
        function confirmSubmitTest() {
            if (confirm('Are you sure you want to submit the test? You will not be able to make changes after submission.')) {
                submitTest();
            }
        }
        
        // Submit the test
        function submitTest() {
            clearInterval(timerInterval);
            testSubmitted = true;
            testModal.style.display = 'none';
            showResults();
        }
        
        // Show test results
        function showResults() {
            const endTime = new Date();
            const timeTaken = endTime - testStartTime;
            
            // Calculate score
            let correct = 0;
            let wrong = 0;
            let unanswered = 0;
            
            userAnswers.forEach((answer, i) => {
                if (answer === null) {
                    unanswered++;
                } else if (answer === shuffledQuestions[i].answer) {
                    correct++;
                } else {
                    wrong++;
                }
            });
            
            // Calculate percentage
            const percentage = (correct / shuffledQuestions.length) * 100;
            
            // Update result display
            totalQuestionsDisplay.textContent = shuffledQuestions.length;
            correctAnswersDisplay.textContent = correct;
            wrongAnswersDisplay.textContent = wrong;
            unansweredDisplay.textContent = unanswered;
            scoreDisplay.textContent = `Score: ${correct}/${shuffledQuestions.length} (${percentage.toFixed(1)}%)`;
            
            // Update time taken
            const hours = Math.floor(timeTaken / (1000 * 60 * 60));
            const minutes = Math.floor((timeTaken % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeTaken % (1000 * 60)) / 1000);
            timeTakenDisplay.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Performance message
            let message = '';
            if (percentage >= 90) {
                message = 'Outstanding performance! You have excellent knowledge of Data Structures.';
            } else if (percentage >= 75) {
                message = 'Great job! You have a strong understanding of Data Structures.';
            } else if (percentage >= 60) {
                message = 'Good effort! You have a decent grasp of Data Structures but could improve in some areas.';
            } else if (percentage >= 40) {
                message = 'Keep practicing! Review the concepts you missed to strengthen your understanding.';
            } else {
                message = 'Consider reviewing the fundamentals of Data Structures. Practice will help improve your scores.';
            }
            performanceMessage.textContent = message;
            
            // Show result modal
            resultModal.style.display = 'block';
            
            // Generate question review
            generateQuestionReview();
        }
        
        // Generate detailed question review
        function generateQuestionReview() {
            questionReview.innerHTML = '';
            
            shuffledQuestions.forEach((q, i) => {
                const questionElement = document.createElement('div');
                questionElement.style.marginBottom = '20px';
                questionElement.style.padding = '15px';
                questionElement.style.borderRadius = '5px';
                questionElement.style.backgroundColor = '#f8f9fa';
                
                const questionText = document.createElement('div');
                questionText.style.fontWeight = 'bold';
                questionText.style.marginBottom = '10px';
                questionText.textContent = `${i + 1}. ${q.question}`;
                questionElement.appendChild(questionText);
                
                const optionsList = document.createElement('div');
                q.options.forEach((opt, j) => {
                    const optionElement = document.createElement('div');
                    optionElement.style.padding = '5px';
                    optionElement.style.margin = '5px 0';
                    optionElement.style.borderRadius = '3px';
                    
                    if (j === q.answer) {
                        optionElement.style.backgroundColor = '#d4edda';
                        optionElement.style.borderLeft = '4px solid #28a745';
                    } else if (userAnswers[i] === j && userAnswers[i] !== q.answer) {
                        optionElement.style.backgroundColor = '#f8d7da';
                        optionElement.style.borderLeft = '4px solid #dc3545';
                    }
                    
                    if (userAnswers[i] === j) {
                        opt = `✓ ${opt}`;
                    }
                    
                    optionElement.textContent = opt;
                    optionsList.appendChild(optionElement);
                });
                questionElement.appendChild(optionsList);
                
                if (userAnswers[i] !== q.answer) {
                    const explanation = document.createElement('div');
                    explanation.style.marginTop = '10px';
                    explanation.style.fontStyle = 'italic';
                    explanation.style.color = '#6c757d';
                    explanation.textContent = `Explanation: ${q.explanation}`;
                    questionElement.appendChild(explanation);
                }
                
                questionReview.appendChild(questionElement);
            });
        }

        function reviewAllQuestions() {
            resultModal.style.display = 'none';
            testModal.style.display = 'block';
            currentQuestionIndex = 0;
            showQuestion(currentQuestionIndex);
            
            // Mark all questions as answered for review
            userAnswers = userAnswers.map((ans, i) => ans === null ? -1 : ans);
            updateQuestionStatus();
        }
        
        // Close result modal
        function closeResultModal() {
            resultModal.style.display = 'none';
            resetTest();
        }
        
        // Reset test state
        function resetTest() {
            currentQuestionIndex = 0;
            userAnswers = new Array(shuffledQuestions.length).fill(null);
            testStartTime = null;
            clearInterval(timerInterval);
            timerInterval = null;
            testSubmitted = false;
            overallTimer.textContent = '01:00:00';
        }
    </script>
</body>
</html>
