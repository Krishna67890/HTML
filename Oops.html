// FavTool Class
class FavTool {
    constructor() {
        this.tools = []; // Initialize an empty array to store tools
    }

    // Add a new tool to the list
    addTool(toolName) {
        if (!this.tools.includes(toolName)) {
            this.tools.push(toolName);
            console.log(`Tool "${toolName}" added to your favorites.`);
        } else {
            console.log(`Tool "${toolName}" is already in your favorites.`);
        }
    }

    // Display all favorite tools
    displayTools() {
        if (this.tools.length > 0) {
            console.log("Your favorite tools:");
            this.tools.forEach((tool, index) => console.log(`${index + 1}. ${tool}`));
        } else {
            console.log("No favorite tools yet.");
        }
    }

    // Remove a tool from the list
    removeTool(toolName) {
        const index = this.tools.indexOf(toolName);
        if (index !== -1) {
            this.tools.splice(index, 1);
            console.log(`Tool "${toolName}" removed from your favorites.`);
        } else {
            console.log(`Tool "${toolName}" is not in your favorites.`);
        }
    }

    // Check if a tool is in the list
    hasTool(toolName) {
        if (this.tools.includes(toolName)) {
            console.log(`Tool "${toolName}" is in your favorites.`);
            return true;
        } else {
            console.log(`Tool "${toolName}" is not in your favorites.`);
            return false;
        }
    }
}

// Usage
const myFavTool = new FavTool();

// Add tools
myFavTool.addTool("Visual Studio Code");
myFavTool.addTool("GitHub");
myFavTool.addTool("Figma");

// Display tools
myFavTool.displayTools();

// Remove a tool
myFavTool.removeTool("GitHub");

// Check for a tool
myFavTool.hasTool("Figma");

// Display tools again
myFavTool.displayTools();

// Constructor for Student
function Student(name, standard, division, rollNumber) {
    this.name = name;
    this.standard = standard;
    this.division = division;
    this.rollNumber = rollNumber;
}

// Adding methods to the prototype
Student.prototype.markAttendance = function () {
    console.log(`Hey, marking attendance for ${this.name} :: Normal attendance`);
};

Student.prototype.grades = function () {
    console.log(`Grades for ${this.name} are excellent.`);
};

Student.prototype.favTool = function (tool) {
    console.log(`${this.name}'s favorite tool is ${tool}.`);
};

// Sportsman constructor (Child of Student)
function Sportsman(name, sport, achievements) {
    Student.call(this, name, "N/A", "N/A", "N/A"); // Inheriting from Student
    this.sport = sport;
    this.achievements = achievements;
}

// Inheriting prototype methods from Student
Sportsman.prototype = Object.create(Student.prototype);
Sportsman.prototype.constructor = Sportsman;

// Adding a parent-specific method
Sportsman.prototype.parentInfo = function () {
    console.log(`${this.name} is a famous sportsman who excels in ${this.sport}.`);
};

// Adding a child-specific method
Sportsman.prototype.childInfo = function () {
    console.log(`Achievements of ${this.name}: ${this.achievements.join(", ")}.`);
};

// Example Usage
const virat = new Sportsman("Virat Kohli", "Cricket", [
    "2011 ICC World Cup",
    "Multiple IPL Championships",
    "Ranked No. 1 in ODI and Test cricket",
]);

// Using inherited methods
virat.markAttendance();
virat.grades();
virat.favTool("Cricket Bat");

// Using Sportsman-specific methods
virat.parentInfo();
virat.childInfo();
