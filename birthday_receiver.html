<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .surprise-container {
            text-align: center;
            z-index: 1;
        }
        h1 {
            font-size: 3em;
            color: #ff1493;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .cake {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            animation: rotate 20s infinite linear;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            font-size: 1.5em;
            color: #333;
            margin: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
        }
        .confetti {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="surprise-container">
        <h1>Happy Birthday! 🎉</h1>
        <div id="message" class="message"></div>
        <img src="" id="selectedCake" class="cake" alt="Birthday Cake">
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');
            const relationship = params.get('relationship');
            const background = params.get('background');

            // Set message based on relationship
            const messages = {
                'sister': `Dear Sister ${name}, you light up my world! 🌟`,
                'brother': `To my amazing Brother ${name}, keep shining! 💫`,
                'mother': `Dearest Mom ${name}, you're the best! ❤️`,
                'father': `Dear Dad ${name}, you're my hero! 💪`,
                'friend': `To my wonderful friend ${name}, stay awesome! 🎈`,
                'dost': `Mere pyaare dost ${name}, janamdin mubarak! 🎊`,
                'bhai': `Mere bhai ${name}, happy birthday! 🎂`,
                'grandmother': `Dearest Grandmother ${name}, you're precious! 💝`,
                'grandfather': `Dear Grandfather ${name}, you're special! 🌟`
            };

            document.getElementById('message').innerHTML = 
                messages[relationship] || `Happy Birthday, ${name}! 🎉`;

            // Add background effects based on selection
            if(background === 'confetti') {
                createConfetti();
            }
            // Add more background effects as needed
        }

        function createConfetti() {
            // Add confetti animation code here
        }
    </script>
</body>
</html>
