<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Master</title>
    <style>
        :root {
            --red: #E74C3C;
            --blue: #3498DB;
            --green: #2ECC71;
            --yellow: #F39C12;
            --board-bg: #ECF0F1;
            --board-border: #95A5A6;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            overflow: hidden;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .player-selection {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .player-btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .player-btn:hover {
            background-color: #2980b9;
        }

        .ludo-container {
            display: flex;
            width: 800px;
            height: 600px;
            background-color: var(--board-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .board {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 2px;
            background-color: white;
            position: relative;
        }

        .cell {
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }

        .home-base {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .red-home { background-color: rgba(231, 76, 60, 0.1); }
        .blue-home { background-color: rgba(52, 152, 219, 0.1); }
        .green-home { background-color: rgba(46, 204, 113, 0.1); }
        .yellow-home { background-color: rgba(243, 156, 18, 0.1); }

        .token {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .token:hover {
            transform: scale(1.1);
        }

        .red-token { background-color: var(--red); }
        .blue-token { background-color: var(--blue); }
        .green-token { background-color: var(--green); }
        .yellow-token { background-color: var(--yellow); }

        .dice {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            padding: 20px;
        }

        #dice-display {
            width: 100px;
            height: 100px;
            background-color: white;
            border: 3px solid var(--board-border);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .player-turn {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #roll-button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #roll-button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div id="player-modal" class="modal">
        <div class="modal-content">
            <h2>Select Number of Players</h2>
            <div class="player-selection">
                <button class="player-btn" data-players="2">2 Players</button>
                <button class="player-btn" data-players="3">3 Players</button>
                <button class="player-btn" data-players="4">4 Players</button>
            </div>
        </div>
    </div>

    <div class="ludo-container" style="display: none;">
        <div class="board" id="ludo-board"></div>
        <div class="dice">
            <div id="dice-display">🎲</div>
            <div class="player-info">
                <div class="player-turn" id="current-player">Select Players First</div>
                <button id="roll-button" disabled>Roll Dice</button>
            </div>
        </div>
    </div>

    <script>
        class LudoGame {
            constructor(playerCount) {
                this.playerCount = playerCount;
                this.board = document.getElementById('ludo-board');
                this.diceDisplay = document.getElementById('dice-display');
                this.rollButton = document.getElementById('roll-button');
                this.currentPlayerDisplay = document.getElementById('current-player');
                
                // Dynamically select players based on count
                const allPlayers = ['red', 'blue', 'green', 'yellow'];
                this.players = allPlayers.slice(0, playerCount);
                
                this.currentPlayerIndex = 0;
                this.diceValue = 0;
                
                this.homePositions = {
                    red: [6, 7, 8, 9, 21, 22, 23, 24],
                    blue: [69, 70, 71, 72, 84, 85, 86, 87],
                    green: [204, 205, 206, 207, 219, 220, 221, 222],
                    yellow: [249, 250, 251, 252, 264, 265, 266, 267]
                };

                this.tokens = {
                    red: [],
                    blue: [],
                    green: [],
                    yellow: []
                };
                
                this.initializeBoard();
                this.setupEventListeners();
            }

            initializeBoard() {
                this.board.innerHTML = ''; // Clear previous board
                for (let i = 0; i < 15 * 15; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.index = i;
                    
                    // Define home bases for active players
                    this.players.forEach(color => {
                        const homeRanges = {
                            red: [0, 36],
                            blue: [54, 90],
                            green: [189, 225],
                            yellow: [234, 270]
                        };
                        
                        const [start, end] = homeRanges[color];
                        if (i >= start && i < end) {
                            cell.classList.add(`${color}-home`, 'home-base');
                        }
                    });
                    
                    this.board.appendChild(cell);
                }
                
                this.placeInitialTokens();
            }

            placeInitialTokens() {
                this.players.forEach(color => {
                    this.homePositions[color].forEach((pos, index) => {
                        const cell = this.board.children[pos];
                        const token = document.createElement('div');
                        token.classList.add('token', `${color}-token`);
                        token.dataset.color = color;
                        token.dataset.homeIndex = index;
                        token.addEventListener('click', () => this.moveToken(token));
                        cell.appendChild(token);
                        this.tokens[color].push(token);
                    });
                });

                // Enable roll button
                this.rollButton.disabled = false;
                this.currentPlayerDisplay.textContent = `${this.players[0].charAt(0).toUpperCase() + this.players[0].slice(1)}'s Turn`;
            }

            setupEventListeners() {
                this.rollButton.addEventListener('click', () => this.rollDice());
            }

            rollDice() {
                this.diceValue = Math.floor(Math.random() * 6) + 1;
                this.diceDisplay.textContent = this.diceValue;
                this.diceDisplay.style.backgroundColor = this.players[this.currentPlayerIndex];
                
                // Check if player can move
                const currentColor = this.players[this.currentPlayerIndex];
                const movableTokens = this.tokens[currentColor].filter(token => 
                    token.parentElement.classList.contains('home-base') || 
                    this.canMoveToken(token)
                );

                if (movableTokens.length === 0) {
                    this.updatePlayerTurn();
                }
            }

            canMoveToken(token) {
                return this.diceValue === 6 || 
                       !token.parentElement.classList.contains('home-base');
            }

            moveToken(token) {
                const currentColor = this.players[this.currentPlayerIndex];
                
                // Validate token movement
                if (token.dataset.color !== currentColor) return;
                if (!this.canMoveToken(token)) return;

                const currentCell = token.parentElement;
                const currentIndex = parseInt(currentCell.dataset.index);
                
                // Logic for moving out of home
                if (currentCell.classList.contains('home-base')) {
                    if (this.diceValue !== 6) return;
                    
                    // Move token to starting position
                    const startPositions = {
                        red: 0,
                        blue: 52,
                        green: 104,
                        yellow: 156
                    };
                    
                    const targetCell = this.board.children[startPositions[currentColor]];
                    targetCell.appendChild(token);
                } else {
                    // Regular token movement
                    const newIndex = (currentIndex + this.diceValue) % (15 * 15);
                    const targetCell = this.board.children[newIndex];
                    
                    // Check for capturing opponent tokens
                    const existingToken = targetCell.querySelector('.token');
                    if (existingToken && existingToken.dataset.color !== currentColor) {
                        this.sendTokenHome(existingToken);
                    }
                    
                    targetCell.appendChild(token);
                }

                // Reset dice after movement
                this.diceValue = 0;
                this.diceDisplay.textContent = '🎲';
                this.diceDisplay.style.backgroundColor = 'white';
                
                this.updatePlayerTurn();
            }

            sendTokenHome(token) {
                const homePositions = this.homePositions[token.dataset.color];
                const emptyHomeCell = homePositions.find(pos => 
                    !this.board.children[pos].querySelector('.token')
                );
                
                if (emptyHomeCell !== undefined) {
                    this.board.children[emptyHomeCell].appendChild(token);
                }
            }

            updatePlayerTurn() {
                this.currentPlayerIndex = (this.currentPlayerIndex + 1) % this.players.length;
                const currentPlayer = this.players[this.currentPlayerIndex];
                this.currentPlayerDisplay.textContent = `${currentPlayer.charAt(0).toUpperCase() + currentPlayer.slice(1)}'s Turn`;
                this.currentPlayerDisplay.style.color = currentPlayer;
            }
        }

        // Player Selection Logic
        document.addEventListener('DOMContentLoaded', () => {
            const playerModal = document.getElementById('player-modal');
            const ludoContainer = document.querySelector('.ludo-container');
            const playerButtons = document.querySelectorAll('.player-btn');

            playerButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const playerCount = parseInt(button.dataset.players);
                    playerModal.style.display = 'none';
                    ludoContainer.style.display = 'flex';
                    
                    // Initialize game with selected player count
                    window.ludoGame = new LudoGame(playerCount);
                });
            });
        });
    </script>
</body>
</html>
