 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewport and Percentage Width Elements</title>
    <style>
        /* Main container styling */
        .main-container {
            display: flex;
        }

        /* Left-side elements */
        .left-side {
            width: 50%;
            padding: 10px;
        }

        .parent_50 {
            width: 100%;
            background-color: green;
            color: white;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }

        .fifty_vw {
            width: 50vw;
            background-color: red;
            color: white;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }

        .twentyFive_vh {
            width: 100%;
            height: 25vh;
            background-color: blue;
            color: white;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }

        .parent {
            width: 100%;
            background-color: yellow;
            color: black;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }

        /* Right-side elements */
        .right-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding: 10px;
            gap: 10px;
        }

        .container1, .container2, .container3, .container4, .container5, .container6 {
            width: 100px;
            height: 100px;
            padding: 10px;
            border: 3px solid;
            text-align: center;
            color: white;
        }

        .container1 {
            background-color: red;
            border-color: turquoise;
        }

        .container2 {
            background-color: rgb(242, 12, 85);
            border-color: gray;
        }

        .container3 {
            background-color: rgb(119, 18, 214);
            border-color: aqua;
        }

        .container4 {
            background-color: red;
            border-color: turquoise;
        }

        .container5 {
            background-color: rgb(242, 12, 85);
            border-color: gray;
        }

        .container6 {
            background-color: rgb(119, 18, 214);
            border-color: aqua;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Left side with main containers -->
        <div class="left-side">
            <div class="parent_50">50% Width</div>
            <div class="fifty_vw">50vw Width</div>
            <div class="twentyFive_vh">25vh Height</div>
            <div class="parent">Another 50% Width</div>
        </div>

        <!-- Right side with smaller containers -->
        <div class="right-side">
            <div class="container1">Container 1</div>
            <div class="container2">Container 2</div>
            <div class="container3">Container 3</div>
            <div class="container4">Container 4</div>
            <div class="container5">Container 5</div>
            <div class="container6">Container 6</div>
        </div>
    </div>
</body>
</html>
